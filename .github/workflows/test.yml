name: MomenPix Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Phase 1a: Static checks ───────────────────────────────────
  static:
    name: Static Tests (71 checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run static checks
        run: node tests/check-index.js

  # ── Phase 1b: Firebase Rules ──────────────────────────────────
  rules:
    name: Firebase Rules Tests (21 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install dependencies
        run: npm install
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Cache Firebase emulator JAR
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulator-firestore-v1.21.0
      - name: Download emulator if not cached
        run: firebase setup:emulators:firestore --project momenpix-rules-test || true
      - name: Start Firestore emulator
        run: |
          firebase emulators:start --only firestore \
            --project momenpix-rules-test \
            --config firebase.json > /tmp/emulator.log 2>&1 &
          echo "Waiting for emulator on port 8080..."
          for i in $(seq 1 40); do
            if curl -s http://127.0.0.1:8080 > /dev/null 2>&1; then
              echo "Emulator ready after ${i}x3s"; break
            fi
            if [ $i -eq 40 ]; then
              echo "Emulator failed to start"
              cat /tmp/emulator.log
              exit 1
            fi
            sleep 3
          done
      - name: Run Rules tests
        run: npx jest tests/firestore-rules.test.js --testTimeout=30000 --forceExit
      - name: Stop emulator
        if: always()
        run: kill $(lsof -t -i:8080) 2>/dev/null || true

  # ── Phase 2: Playwright UI Tests ─────────────────────────────
  ui:
    name: UI Tests — Playwright (10 tests)
    runs-on: ubuntu-latest
    needs: [static]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Wait for GitHub Pages deployment
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://usellouk-bot.github.io/snaptogether2/)
            if [ "$STATUS" = "200" ]; then
              echo "Site is live (HTTP $STATUS)"; break
            fi
            echo "Attempt $i: HTTP $STATUS — waiting..."
            sleep 15
          done
      - name: Run Playwright UI tests
        run: npx playwright test tests/ui.spec.js --config=playwright.config.js
      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
