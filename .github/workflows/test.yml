name: MomenPix Tests

on:
  push:
    paths:
      - 'index.html'
      - 'admin.html'
      - 'tests/**'
  workflow_dispatch:  # מאפשר הפעלה ידנית

jobs:
  static-check:
    name: Static Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run static regression tests
        run: node tests/check-index.js

  
