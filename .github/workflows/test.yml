name: MomenPix Tests

on:
  push:
    paths:
      - 'index.html'
      - 'admin.html'
      - 'tests/**'
  workflow_dispatch:  # מאפשר הפעלה ידנית

jobs:
  static-check:
    name: Static Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run static regression tests
        run: node tests/check-index.js

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: static-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npx playwright test tests/smoke/ --config=tests/smoke/playwright.config.js
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/smoke/report/
          retention-days: 7
